<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clients | APPLETTEK</title>
  <meta name="description" content="Organizations that trust Applettek for IT consulting and delivery." />
  <link rel="icon" href="assets/brand/logos/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#F04C23', 100: '#ea3b10', soft: '#f25f3b' },
            secondary: '#FF6037',
            tertiary: '#DC380F',
            quaternary: '#383F48',
            dark: '#212529',
            grey: { DEFAULT: '#777', light: '#F4F4F4', soft: '#F3F3F3', mid: '#5a6267', border: '#404040' }
          },
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          boxShadow: {
            card: '0 0 40px 0 rgba(187, 187, 187, 0.3)',
            soft: '0 12px 40px rgba(0,0,0,0.08)',
            img: '0 10px 30px rgba(0,0,0,0.12)',
          },
          maxWidth: { container: '1140px' }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="css/site.css" />
  
</head>
<body class="bg-white antialiased" data-base="" data-page="clients">
  <div id="site-header"></div>
  <main>

    <section class="page-hero relative py-20 md:py-28 text-white" style="background-image: linear-gradient(rgba(33,37,41,0.75), rgba(33,37,41,0.75)), url('assets/theme/backgrounds/background-1.jpg');">
      <div class="max-w-container mx-auto px-4 relative z-[1]">
        <p class="text-sm font-medium tracking-wider text-primary mb-3">Home | Clients</p>
        <h1 class="text-4xl md:text-5xl font-semibold text-white">Clients</h1>
      </div>
    </section>

    <section class="py-16 md:py-20 bg-white">
      <div class="max-w-container mx-auto px-4">
        
        <div class="text-center max-w-3xl mx-auto mb-12">
          <h2 class="text-dark text-3xl font-semibold mb-4">Industries We Serve</h2>
          <p class="text-lg">We partner with enterprises across finance, retail, technology, and professional services. Client logos coming soon.</p>
        </div>
        <div class="flex flex-wrap justify-center items-center gap-12 md:gap-16 py-8">
          <img src="assets/stock/client-1.jpg" alt="Enterprise partner" class="h-20 w-36 object-cover rounded shadow-img" />
          <img src="assets/stock/client-2.jpg" alt="Retail partner" class="h-20 w-36 object-cover rounded shadow-img" />
          <img src="assets/stock/client-3.jpg" alt="Technology partner" class="h-20 w-36 object-cover rounded shadow-img" />
          <img src="assets/stock/client-4.jpg" alt="Industry partner" class="h-20 w-36 object-cover rounded shadow-img" />
        </div>
        <div class="text-center mt-12">
          <a href="contact-us.html" class="btn-offset inline-flex bg-primary text-white font-semibold px-6 py-3"><span>Become a Client</span></a>
        </div>
        
      </div>
    </section>

  </main>
  <div id="site-footer"></div>
  <script src="js/site.js"></script>
</body>
</html>
